name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: |
            backend/
            frontend/dist/
          target: /var/www/procncmaroc/
          strip_components: 0
          rm: false

      - name: Post-deploy commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # Copy Vue build to public_html
            rm -rf /var/www/procncmaroc/public_html/assets
            rm -f /var/www/procncmaroc/public_html/index.html
            cp -r /var/www/procncmaroc/frontend/dist/* /var/www/procncmaroc/public_html/

            # Ensure api symlink exists
            ln -sf /var/www/procncmaroc/api/public /var/www/procncmaroc/public_html/api

            # Laravel production setup
            cd /var/www/procncmaroc/api
            composer install --no-dev --optimize-autoloader --no-interaction

            # Cache (skip if .env not ready — post-deploy.sh handles first time)
            if [ -f .env ]; then
              php artisan config:cache || true
              php artisan route:cache || true
              php artisan view:cache || true
              php artisan migrate --force || true
              php artisan storage:link || true
            fi

            # Permissions
            sudo chown -R www-data:www-data /var/www/procncmaroc/storage /var/www/procncmaroc/api/storage /var/www/procncmaroc/api/bootstrap/cache 2>/dev/null || true

            # Reload PHP
            sudo systemctl reload php8.3-fpm 2>/dev/null || sudo systemctl reload php8.2-fpm 2>/dev/null || true
