server {
    listen 80;
    server_name procncmaroc.com www.procncmaroc.com;
    root /var/www/procncmaroc/public_html;
    index index.html;

    client_max_body_size 50M;

    # Vue SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Laravel API (symlinked: public_html/api -> ../api/public)
    location /api {
        try_files $uri /api/index.php?$query_string;
        location ~ \.php$ {
            fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }

    # Laravel storage
    location /storage/ {
        alias /var/www/procncmaroc/storage/;
    }
}
